name: majidalbana
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
 
environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  http: ^1.2.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
 
flutter:
  uses-material-design: true
 
  assets:
    - assets/images/ 
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/jfflat.ttf
          weight: 400
 